# Fields per setpoint:
#   Position  (meters, world/odom frame):  x, y, z
#   Orientation (radians, ZYX convention): roll, pitch, yaw
#   Linear velocity  (m/s):               vx, vy, vz
#   Angular velocity (rad/s):             wx, wy, wz
#   Tolerances (optional — defaults used if omitted):
#     position_tolerance (meters)
#     angular_tolerance  (radians)

