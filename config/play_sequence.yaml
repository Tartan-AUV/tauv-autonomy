# play_commands.py sequence file
#
# Each step requires: type, duration, and either wrench or rpm values.
#
# type: wrench
#   wrench: [fx, fy, fz, tx, ty, tz]   force [N] and torque [N·m]
#   Publishes to /cmd_wrench — routed through thruster_controller TAM
#   fx=surge  fy=sway  fz=heave  tx=roll  ty=pitch  tz=yaw
#
# type: rpm
#   rpm: [r0, r1, r2, r3, r4, r5, r6, r7]   per-thruster RPM
#   Publishes directly to /thruster_rpm — bypasses thruster_controller
#   index:  BLH  FLU  BLU  FLH  BRH  FRU  BRU  FRH
#             0    1    2    3    4    5    6    7

startup_delay: 20.0

sequence:
 
  - type: rpm
    rpm: [0, -8000, 2000, 0, 0, 2000, -8000, 0]
    duration: 10.0

  - type: rpm
    rpm: [0, 8000, -2000, 0, 0, -2000, 2000, 0]
    duration: 10.0
